<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MindustryMIT JSON Editor</title>
  <meta name="description" content="Mindustry JSON mod editor">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#111418">
</head>

<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="icon.svg" alt="" class="brand-mark">
        <div class="brand-copy">
          <strong>MindustryMIT JSON Editor</strong>
          <span id="connectionState">离线模式</span>
        </div>
      </div>

      <nav class="toolbar" aria-label="项目操作">
        <button type="button" class="btn primary" data-action="open-new-dialog" title="新建内容">新建</button>
        <button type="button" class="btn" data-action="import-json" title="导入 JSON">导入</button>
        <button type="button" class="btn" data-action="save-project" title="保存到浏览器">保存</button>
        <button type="button" class="btn" data-action="validate-project" title="检查当前项目">检查</button>
        <button type="button" class="btn" data-action="download-current" title="下载当前 JSON">下载</button>
      </nav>

      <form id="connectionForm" class="connection-form">
        <label>
          <span>WebSocket</span>
          <input id="wsUrl" name="wsUrl" value="ws://127.0.0.1:19190" autocomplete="off">
        </label>
        <label>
          <span>Data_Dir</span>
          <input id="dataDir" name="dataDir" value="./data" autocomplete="off">
        </label>
        <button type="submit" class="btn">连接</button>
        <button type="button" class="btn" data-action="init-backend">Init</button>
      </form>
    </header>

    <main class="workspace">
      <aside class="left-pane">
        <section class="panel manifest-panel">
          <div class="panel-head">
            <h2>mod.json</h2>
            <button type="button" class="icon-btn" data-action="select-manifest" title="编辑 mod.json">编辑</button>
          </div>
          <div class="manifest-grid">
            <label>
              <span>name</span>
              <input data-manifest="name" autocomplete="off">
            </label>
            <label>
              <span>displayName</span>
              <input data-manifest="displayName" autocomplete="off">
            </label>
            <label>
              <span>version</span>
              <input data-manifest="version" autocomplete="off">
            </label>
            <label>
              <span>minGameVersion</span>
              <input data-manifest="minGameVersion" autocomplete="off">
            </label>
          </div>
        </section>

        <section class="panel asset-panel">
          <div class="panel-head">
            <h2>内容文件</h2>
            <button type="button" class="icon-btn accent" data-action="open-new-dialog" title="新建内容">+</button>
          </div>
          <div class="filter-line">
            <select id="kindFilter" title="目录筛选">
              <option value="all">全部目录</option>
              <option value="blocks">blocks</option>
              <option value="items">items</option>
              <option value="liquids">liquids</option>
              <option value="units">units</option>
              <option value="status-effects">status-effects</option>
              <option value="weathers">weathers</option>
              <option value="planets">planets</option>
            </select>
            <input id="assetSearch" placeholder="搜索文件" autocomplete="off">
          </div>
          <div id="assetList" class="asset-list" role="list"></div>
        </section>

        <section class="panel class-panel">
          <div class="panel-head">
            <h2>类浏览</h2>
            <span id="classCount" class="badge">0</span>
          </div>
          <input id="classSearch" placeholder="搜索类或字段" autocomplete="off">
          <div id="classList" class="class-list" role="list"></div>
        </section>
      </aside>

      <section class="editor-pane">
        <div class="editor-head">
          <div class="asset-title">
            <strong id="activeTitle">未选择内容</strong>
            <span id="activePath">mod.json</span>
          </div>
          <div class="view-tabs" role="tablist" aria-label="编辑视图">
            <button type="button" class="is-active" data-view="table">表格</button>
            <button type="button" data-view="json">预览</button>
            <button type="button" data-view="backend">后端</button>
          </div>
        </div>

        <div id="assetConfig" class="asset-config"></div>

        <div class="field-addbar">
          <select id="fieldSelect" title="可添加字段"></select>
          <button type="button" class="btn primary" data-action="add-selected-field">添加字段</button>
          <button type="button" class="btn" data-action="get-selected-value">GetFieldValue</button>
          <button type="button" class="btn" data-action="export-from-backend">ExportClass</button>
        </div>

        <div id="editorBody" class="editor-body"></div>
      </section>

      <aside class="right-pane">
        <section class="panel inspector-panel">
          <div class="panel-head">
            <h2>字段文档</h2>
            <span id="selectionKind" class="badge">none</span>
          </div>
          <div id="inspectorBody" class="inspector-body"></div>
        </section>

        <section class="panel preview-panel">
          <div class="panel-head">
            <h2>实时 JSON</h2>
            <button type="button" class="icon-btn" data-action="copy-current-json" title="复制 JSON">复制</button>
          </div>
          <pre id="livePreview" class="mini-preview"></pre>
        </section>

        <section class="panel feedback-panel">
          <div class="panel-head">
            <h2>反馈</h2>
            <span id="problemCount" class="badge">0</span>
          </div>
          <div id="feedbackList" class="feedback-list"></div>
        </section>
      </aside>
    </main>
  </div>

  <div id="newDialog" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="newDialogTitle">
    <form id="newContentForm" class="modal">
      <div class="modal-head">
        <h2 id="newDialogTitle">新建内容</h2>
        <button type="button" class="icon-btn" data-action="close-new-dialog" title="关闭">×</button>
      </div>
      <div class="form-grid">
        <label>
          <span>目录</span>
          <select name="kind" id="newKind"></select>
        </label>
        <label>
          <span>类</span>
          <select name="className" id="newClassName"></select>
        </label>
        <label class="span-2">
          <span>文件名</span>
          <input name="fileName" value="copper-wall" required pattern="[a-z0-9._-]+" autocomplete="off">
        </label>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" data-action="close-new-dialog">取消</button>
        <button type="submit" class="btn primary">创建</button>
      </div>
    </form>
  </div>

  <input id="fileInput" class="hidden" type="file" accept="application/json,.json">
  <div id="toastRegion" class="toast-region" aria-live="polite"></div>
  <script src="js/app.js"></script>
</body>

</html>
