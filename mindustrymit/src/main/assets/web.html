<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindustry MIT</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { idea: {
                bg: '#1e1e1e', panel: '#252526', card: '#2d2d30', border: '#3e3e42', borderDark: '#1e1e1e',
                text: '#cccccc', textMuted: '#858585', keyword: '#569cd6', string: '#ce9178',
                number: '#b5cea8', field: '#9cdcfe', button: '#0e639c', buttonHover: '#1177bb',
                hover: '#2a2d2e', selection: '#04395e', danger: '#f14c4c', dangerHover: '#d13c3c'
            }}}}
        };
    </script>
    <script>
        (() => {
            let savedTheme = null;
            try { savedTheme = localStorage.getItem('theme'); } catch (e) {}
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const dark = savedTheme ? savedTheme === 'dark' : prefersDark;
            document.documentElement.classList.toggle('dark', dark);
            document.addEventListener('DOMContentLoaded', () => document.body.classList.toggle('dark', dark));
            document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        })();
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    
    <!-- 引入外部 CSS -->
    <link rel="stylesheet" href="/web.css">
    <script src="/web.js"></script>
</head>
<body class="bg-white text-slate-800 dark:bg-idea-bg dark:text-idea-text transition-colors duration-300">

<div id="app" class="flex flex-col h-full relative">

    <!-- 全局 Toast -->
    <div class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none w-72 max-w-[90vw]">
        <transition-group name="toast">
            <div v-for="toast in toasts" :key="toast.id" class="px-4 py-3 rounded-lg shadow-xl text-sm font-medium flex items-start gap-2 backdrop-blur-sm" :class="toast.type === 'error' ? 'bg-red-500 dark:bg-idea-danger text-white' : (toast.type === 'success' ? 'bg-green-500 dark:bg-[#496d49] text-white' : 'bg-slate-800 text-white dark:bg-idea-panel dark:text-idea-text dark:border dark:border-idea-border')">
                <span class="break-words flex-1 mt-0.5 leading-tight">{{ toast.msg }}</span>
            </div>
        </transition-group>
    </div>

    <!-- 设置弹窗 -->
    <transition name="modal">
        <div v-if="homeSettingsOpen" class="fixed inset-0 bg-black/50 dark:bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 transition-colors" @click.stop="homeSettingsOpen = false">
            <div class="modal-content bg-white dark:bg-idea-panel rounded-xl shadow-2xl p-4 md:p-6 w-full max-w-[520px] border border-transparent dark:border-idea-borderDark transition-colors" @click.stop>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg md:text-xl font-bold text-slate-800 dark:text-idea-text">设置</h3>
                    <button @click="homeSettingsOpen = false" class="touch-btn w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-idea-text">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-idea-textMuted mb-1">WebSocket 地址</label>
                        <input v-model="wsUrl" @change="saveConnectionSettings" class="touch-input w-full text-slate-800 dark:text-idea-string px-4 py-3 rounded-lg text-sm border border-slate-300 dark:border-idea-border bg-white dark:bg-idea-bg focus:border-indigo-500 outline-none transition-colors" placeholder="ws://127.0.0.1:8317">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-idea-textMuted mb-1">数据目录</label>
                        <input v-model="dataDir" @change="saveConnectionSettings" class="touch-input w-full text-slate-800 dark:text-idea-string px-4 py-3 rounded-lg text-sm border border-slate-300 dark:border-idea-border bg-white dark:bg-idea-bg focus:border-indigo-500 outline-none transition-colors" placeholder=".mindustrymit-data">
                    </div>
                    <div class="p-3 rounded-lg border border-slate-200 dark:border-idea-border bg-slate-50 dark:bg-idea-card">
                        <div class="flex items-center gap-2">
                            <span :class="['w-2.5 h-2.5 rounded-full shrink-0', connectionStatusDotClass]"></span>
                            <span class="text-sm font-medium" :class="connectionStatusTextClass">{{ connectionStatusLabel }}</span>
                        </div>
                        <p v-if="connectProgress.text" class="text-xs text-slate-500 dark:text-idea-textMuted mt-2 break-words">{{ connectProgress.text }}</p>
                        <div v-if="isConnecting" class="mt-3">
                            <div class="w-full bg-slate-200 dark:bg-idea-bg rounded-full h-2 overflow-hidden">
                                <div class="bg-indigo-500 dark:bg-idea-button h-2 rounded-full transition-all duration-300" :style="{ width: connectProgress.percent + '%' }"></div>
                            </div>
                        </div>
                    </div>
                    <button @click="connectAndInit({ manual: true })" :disabled="isConnecting" class="touch-btn w-full bg-indigo-600 dark:bg-idea-button hover:bg-indigo-700 text-white px-4 py-3 rounded-lg font-medium shadow active:scale-[0.99] disabled:opacity-50 flex justify-center items-center gap-2">
                        <svg v-if="isConnecting" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        {{ isConnecting ? '连接中...' : '连接' }}
                    </button>
                </div>
            </div>
        </div>
    </transition>

    <!-- 更多弹窗 -->
    <transition name="modal">
        <div v-if="homeMoreOpen" class="fixed inset-0 bg-black/50 dark:bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 transition-colors" @click.stop="homeMoreOpen = false">
            <div class="modal-content bg-white dark:bg-idea-panel rounded-xl shadow-2xl p-4 md:p-6 w-full max-w-[520px] border border-transparent dark:border-idea-borderDark transition-colors" @click.stop>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg md:text-xl font-bold text-slate-800 dark:text-idea-text">更多</h3>
                    <button @click="homeMoreOpen = false" class="touch-btn w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-idea-text">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="p-4 rounded-lg border border-slate-200 dark:border-idea-border bg-slate-50 dark:bg-idea-card">
                    <div class="font-bold text-slate-700 dark:text-idea-text">Mindustry MIT</div>
                    <p class="text-sm text-slate-500 dark:text-idea-textMuted mt-2">这里先作为后续功能入口预留。</p>
                </div>
            </div>
        </div>
    </transition>

    <!-- 主页 -->
    <main class="flex-1 flex overflow-hidden relative">
        <div class="flex-1 bg-slate-50 dark:bg-idea-bg flex items-center justify-center p-5 transition-colors">
            <section class="w-full max-w-xl">
                <div class="bg-white dark:bg-idea-panel border border-slate-200 dark:border-idea-borderDark rounded-2xl shadow-2xl p-6 md:p-8 transition-colors">
                    <div class="flex flex-col items-center text-center mb-8">
                        <div class="w-16 h-16 bg-indigo-500 dark:bg-idea-button rounded-2xl flex items-center justify-center font-bold text-4xl shadow-lg text-white mb-4">M</div>
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800 dark:text-idea-text">Mindustry MIT</h2>
                        <p class="text-sm text-slate-500 dark:text-idea-textMuted mt-2">可视化 Mindustry Mod JSON 编辑器</p>
                        <div class="flex items-center gap-2 mt-4 px-3 py-1.5 rounded border border-slate-200 dark:border-idea-border bg-slate-50 dark:bg-idea-bg">
                            <span :class="['w-2 h-2 rounded-full', connectionStatusDotClass]"></span>
                            <span class="text-xs font-medium" :class="connectionStatusTextClass">{{ connectionStatusLabel }}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-3">
                        <button @click="handleStart" :disabled="!connected" class="touch-btn w-full p-4 bg-indigo-600 dark:bg-idea-button hover:bg-indigo-700 dark:hover:bg-idea-buttonHover text-white rounded-xl font-bold shadow-lg active:scale-[0.99] transition-all flex items-center justify-between disabled:opacity-50 disabled:cursor-not-allowed">
                            <span>{{ connected ? '开始' : (isConnecting ? '正在连接...' : '等待连接') }}</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        </button>
                        <button @click="homeSettingsOpen = true" class="touch-btn w-full p-4 bg-white dark:bg-idea-card border border-slate-200 dark:border-idea-border hover:border-indigo-300 dark:hover:border-idea-button hover:bg-slate-50 dark:hover:bg-idea-hover rounded-xl font-medium text-slate-700 dark:text-idea-text transition-colors flex items-center justify-between">
                            <span>设置</span><span class="text-xs text-slate-400 dark:text-idea-textMuted">WebSocket</span>
                        </button>
                        <button @click="homeMoreOpen = true" class="touch-btn w-full p-4 bg-white dark:bg-idea-card border border-slate-200 dark:border-idea-border hover:border-indigo-300 dark:hover:border-idea-button hover:bg-slate-50 dark:hover:bg-idea-hover rounded-xl font-medium text-slate-700 dark:text-idea-text transition-colors flex items-center justify-between">
                            <span>更多</span><span class="text-xs text-slate-400 dark:text-idea-textMuted">预留</span>
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

</div>

</body>
</html>
